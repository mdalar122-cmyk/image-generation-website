<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nano Banana 2 - GitHub Safe</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: 'Courier New', monospace; text-align: center; padding: 40px; }
        .main-box { border: 2px solid #222; padding: 30px; border-radius: 15px; display: inline-block; background: #0a0a0a; }
        input { background: #111; border: 1px solid #00ff88; color: #fff; padding: 12px; width: 300px; border-radius: 5px; outline: none; }
        button { background: #00ff88; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-left: 10px; }
        button:hover { background: #00cc6e; }
        #output { margin-top: 30px; display: none; }
        img { max-width: 100%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,136,0.2); border: 1px solid #333; }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🍌 NANO BANANA 2</h1>
    <p>GitHub Güvenli & Sınırsız Görsel Oluşturucu</p>

    <div class="main-box">
        <input type="text" id="promptText" placeholder="Ne hayal ediyorsun?">
        <button onclick="generateImage()">OLUŞTUR</button>
        <div id="status" class="status"></div>
    </div>

    <div id="output">
        <img id="genImg" src="" alt="Görsel">
    </div>

    <script>
        function generateImage() {
            const prompt = document.getElementById('promptText').value;
            const img = document.getElementById('genImg');
            const output = document.getElementById('output');
            const status = document.getElementById('status');

            if(!prompt) return alert("Lütfen bir açıklama yaz!");

            status.innerText = "Yapay zeka fırçalarını hazırlıyor...";
            
            // GitHub'ın engelleyemeyeceği şifresiz ve açık bir kaynak kullanıyoruz
            const randomSeed = Math.floor(Math.random() * 99999);
            const encodedPrompt = encodeURIComponent(prompt);
            
            // Bu URL doğrudan görseli döndürür, API Key gerektirmez
            const imageUrl = `https://pollinations.ai{encodedPrompt}?seed=${randomSeed}&width=1024&height=1024&nologo=true`;

            img.onload = function() {
                status.innerText = "Tamamlandı!";
                output.style.display = "block";
            };

            img.onerror = function() {
                status.innerText = "Bir hata oluştu, tekrar dene.";
            };

            img.src = imageUrl;
        }
    </script>
</body>
</html>
