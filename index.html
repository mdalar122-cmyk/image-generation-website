<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nano Banana 2 - Ultra Raw</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 10px; background: #0a0a0a; }
        input { background: #111; border: 1px solid #444; color: #fff; padding: 10px; width: 300px; outline: none; }
        button { background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ccc; }
        #result { margin-top: 30px; max-width: 600px; border: 2px solid #222; display: none; }
        .loading { display: none; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>NANO BANANA 2</h1>

    <div class="box">
        <input type="text" id="prompt" placeholder="Bir şey yaz...">
        <button onclick="generate()">OLUŞTUR</button>
    </div>

    <div id="loader" class="loading">İşleniyor... (Bu biraz sürebilir)</div>
    <img id="result" src="" alt="Generated Image">

    <script>
        // BURAYA Hugging Face'den aldığın ücretsiz 'Access Token'ı yapıştır
        const HF_TOKEN = "BURAYA_TOKEN_GELECEK"; 

        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const img = document.getElementById('result');
            const loader = document.getElementById('loader');

            if(!prompt) return;

            loader.style.display = "block";
            img.style.display = "none";

            try {
                const response = await fetch(
                    "https://huggingface.co",
                    {
                        headers: { Authorization: `Bearer ${HF_TOKEN}` },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                const result = await response.blob();
                img.src = URL.createObjectURL(result);
                img.style.display = "block";
            } catch (error) {
                alert("Hata oluştu! Token'ı doğru girdiğinden emin ol.");
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
