<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Banana 2 - GitHub Edition</title>
    <!-- Puter.js SDK: Sunucusuz ve ücretsiz görsel üretimi sağlar -->
    <script src="https://puter.com"></script>
    <style>
        :root { --accent: #ffcc00; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .hero { text-align: center; padding: 40px 0; }
        .hero h1 { font-size: 2.5rem; color: var(--accent); margin: 0; }
        
        .input-group { background: var(--card); padding: 25px; border-radius: 20px; display: flex; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #222; color: white; font-size: 16px; }
        button { background: var(--accent); color: black; border: none; padding: 0 30px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:disabled { background: #444; cursor: wait; }

        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .img-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        .img-card img { width: 100%; height: auto; display: block; }
        .img-card .badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px; font-size: 10px; }
        
        .loading-bar { height: 3px; width: 0%; background: var(--accent); position: fixed; top: 0; left: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="loader" class="loading-bar"></div>

    <div class="container">
        <div class="hero">
            <h1>🍌 Nano Banana 2</h1>
            <p>GitHub Üzerinden Sınırsız Görsel Deneyimi</p>
        </div>

        <div class="input-group">
            <input type="text" id="prompt" placeholder="Hayalindeki görseli tarif et (İngilizce daha iyi sonuç verir)...">
            <button id="drawBtn" onclick="draw()">Çiz!</button>
        </div>

        <div id="gallery"></div>
    </div>

    <script>
        async function draw() {
            const input = document.getElementById('prompt');
            const btn = document.getElementById('drawBtn');
            const loader = document.getElementById('loader');
            const gallery = document.getElementById('gallery');

            if(!input.value) return;

            btn.disabled = true;
            loader.style.width = "70%";

            try {
                // Nano Banana 2 (Gemini 3.1 Flash Image) modelini kullanarak üretim
                const img = await puter.ai.txt2img(input.value + ", digital art, 4k resolution");

                const card = document.createElement('div');
                card.className = 'img-card';
                card.innerHTML = `<span class="badge">Nano Banana 2</span>`;
                card.appendChild(img);
                
                gallery.prepend(card);
                loader.style.width = "100%";
                setTimeout(() => loader.style.width = "0%", 500);
                input.value = "";

            } catch (err) {
                alert("Hata: " + err.message);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
